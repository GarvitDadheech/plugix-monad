services:
  postgres:
    image: postgres:16-alpine
    container_name: plugix-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: plugix
      POSTGRES_USER: plugix
      POSTGRES_PASSWORD: plugix
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/web/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./apps/web/db/pg_hba.conf:/var/lib/postgresql/pg_hba.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plugix -d plugix"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local
